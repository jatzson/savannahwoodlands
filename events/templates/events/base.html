<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Savannah Woodlands{% endblock %}</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --forest: #1a3a2e;
            --gold: #c9a84c;
            --gold-light: #e8c96a;
            --cream: #faf8f3;
            --charcoal: #2c2c2c;
            --muted: #6b7280;
            --border: #e5e0d8;
            --white: #ffffff;
        }
        html {
            overflow-x: hidden;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            color: var(--charcoal);
            line-height: 1.6;
            overflow-x: hidden;
            width: 100%;
        }
        img { max-width: 100%; }

        /* NAV */
        nav {
            background: var(--forest);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            flex-shrink: 0;
        }
        .nav-logo-img {
            height: 42px;
            width: auto;
            filter: brightness(0) invert(1);
        }
        .nav-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--white);
            letter-spacing: 0.02em;
        }
        .nav-brand span {
            display: block;
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            color: var(--gold);
            text-transform: uppercase;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }
        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--gold); }
        .nav-cta {
            background: var(--gold) !important;
            color: var(--forest) !important;
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            font-weight: 600 !important;
            white-space: nowrap;
        }

        /* NAV — MOBILE HAMBURGER */
        .nav-toggle {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 32px;
            height: 32px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            flex-shrink: 0;
        }
        .nav-toggle span {
            display: block;
            width: 100%;
            height: 2px;
            background: var(--white);
            border-radius: 2px;
            transition: transform 0.25s ease, opacity 0.25s ease;
        }
        .nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .nav-toggle.open span:nth-child(2) { opacity: 0; }
        .nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        @media (max-width: 768px) {
            nav { padding: 0 1.25rem; }
            .nav-brand { font-size: 0.95rem; }
            .nav-toggle { display: flex; }
            .nav-links {
                position: absolute;
                top: 70px;
                left: 0;
                right: 0;
                background: var(--forest);
                flex-direction: column;
                align-items: stretch;
                gap: 0;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease;
                box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            }
            .nav-links.open { max-height: 320px; }
            .nav-links li { width: 100%; }
            .nav-links a {
                display: block;
                padding: 1rem 1.25rem;
                border-top: 1px solid rgba(255,255,255,0.08);
            }
            .nav-cta {
                display: inline-block;
                margin: 1rem 1.25rem;
                text-align: center;
            }
        }

        /* FOOTER */
        footer {
            background: var(--forest);
            color: rgba(255,255,255,0.7);
            text-align: center;
            padding: 2.5rem 2rem;
            margin-top: 5rem;
        }
        footer .footer-brand {
            font-family: 'Playfair Display', serif;
            color: var(--white);
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }
        footer .footer-tag {
            color: var(--gold);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        footer .footer-contact { font-size: 0.85rem; }
        footer .footer-contact a { color: var(--gold); text-decoration: none; }

        /* UTILITIES */
        .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }
        .btn {
            display: inline-block;
            padding: 0.85rem 2rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-gold {
            background: var(--gold);
            color: var(--forest);
        }
        .btn-gold:hover { background: var(--gold-light); }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
        }
        .btn-outline:hover { background: var(--gold); color: var(--forest); }

        @media (max-width: 600px) {
            .container { padding: 0 1.25rem; }
            footer { padding: 2rem 1.25rem; }
            .btn { padding: 0.8rem 1.5rem; font-size: 0.9rem; }
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <nav>
        <a href="{% url 'home' %}" class="nav-logo">
            <img src="{% static 'events/img/logo.png' %}" alt="Savannah Woodlands" class="nav-logo-img">
        </a>
        <ul class="nav-links" id="navLinks">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'home' %}#tickets">Tickets</a></li>
            <li><a href="{% url 'home' %}#contact">Enquiries</a></li>
            <li><a href="{% url 'register' %}" class="nav-cta">Register Now</a></li>
        </ul>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="navLinks">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <script>
        (function () {
            var toggle = document.getElementById('navToggle');
            var links = document.getElementById('navLinks');
            if (!toggle || !links) return;
            toggle.addEventListener('click', function () {
                var isOpen = links.classList.toggle('open');
                toggle.classList.toggle('open', isOpen);
                toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            });
            links.querySelectorAll('a').forEach(function (a) {
                a.addEventListener('click', function () {
                    links.classList.remove('open');
                    toggle.classList.remove('open');
                    toggle.setAttribute('aria-expanded', 'false');
                });
            });
        })();
    </script>

    {% block content %}{% endblock %}

    <footer>
        <img src="{% static 'events/img/logo.png' %}" alt="Savannah Woodlands" style="height:60px;width:auto;filter:brightness(0) invert(1);margin-bottom:0.75rem;">
        <div class="footer-contact">
            <p>📞 <a href="tel:+2349015948870">+234 901 594 8870</a> &nbsp;|&nbsp; <a href="tel:+2349011229236">+234 901 122 9236</a> &nbsp;|&nbsp; ✉ <a href="mailto:info@savannahwoodlands.com">info@savannahwoodlands.com</a></p>
            <p style="margin-top:1rem;font-size:0.75rem;opacity:0.5;">© 2026 Savannah Woodlands Ltd. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
